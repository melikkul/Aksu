name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHONPATH: src

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/ tests/ --output-format=github
      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Unit & Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,benchmark]"
      - name: Run tests (skip GPU and slow)
        run: |
          python -m pytest tests/ -m "not gpu and not slow" -q --tb=short \
            --cov=src --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  readme-examples:
    name: README Examples
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Run README examples test
        run: python -m pytest tests/test_readme_examples.py -v

  dvc-repro-dry:
    name: DVC Dry Repro
    needs: lint
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install DVC
        run: pip install 'dvc[s3]'
      - name: Create stub deps for dry run
        run: |
          mkdir -p data/external/boun_treebank
      - name: DVC dry repro
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then
            dvc repro --dry --allow-missing
          else
            dvc repro --dry
          fi

  license-version-consistency:
    name: License & Version Consistency
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run consistency tests
        run: python -m pytest tests/test_version_license_consistency.py -v

  clean-room-pip-install:
    name: Clean-Room Install Verification
    needs: test
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - name: Install CPU torch then package
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,benchmark]"
      - name: Verify public API importable
        run: |
          python -c "
          from aksu import Atomizer, MorphoAnalyzer, TextCleaner, turkish_lower, __version__
          print('aksu version:', __version__)
          a = Atomizer(backend='zeyrek')
          result = a.to_canonical('evlerinden')
          print('evlerinden →', result)
          assert result, 'to_canonical returned empty string'
          "
      - name: Verify CLI entry point
        run: aksu --help
